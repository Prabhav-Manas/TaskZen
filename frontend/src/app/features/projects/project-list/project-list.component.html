<app-header></app-header>
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h3>My Projects</h3>

        <button class="btn btn-primary">+ Create Project</button>

    </div>

    <div class="row g-4">

        <div class="col-md-4" *ngFor="let project of projects">

            <div class="card shadow-sm h-100">

                <div class="card-body">

                    <h5 class="card-title">{{project.name}}</h5>

                    <p class="text-muted">{{project.description}}</p>

                    <div class="mb-2">

                        <span class="badge bg-info me-2">Tasks: {{project.tasks}}</span>

                        <span class="badge" [ngClass]="{'bg-success': project.status=='Active', 'bg-warning': project.status=='In Progress', 'bg-secondary': project.status=='Completed'}">{{project.status}}</span>

                    </div>

                    <button class="btn btn-outline-primary btn-sm" (click)="openProject(project.id)">Open Project</button>

                </div>

            </div>

        </div>

    </div>

</div>
