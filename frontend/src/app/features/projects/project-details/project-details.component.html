<div class="container-fluid py-4" *ngIf="project">
  <app-header></app-header>

  <!-- Project Header -->
  <div class="row mb-4">
    <div class="col-12">
      <app-card>
        <div class="row align-items-start g-3">

          <!-- Left -->
          <div class="col-12 col-md-8">
            <div class="project-icon d-flex flex-wrap align-items-center gap-2 mb-1">
              <i class="fa fa-folder-open"></i>

              <h4 class="mb-0 fw-semibold">
                {{ project.name }}
              </h4>

              <span class="badge"
                [ngClass]="{
                  'bg-success': project.status === 'active',
                  'bg-secondary': project.status === 'completed'
                }">
                {{ project.status || 'Active' }}
              </span>
            </div>

            <p class="text-muted mb-0">
              {{ project.description || 'No description available' }}
            </p>
          </div>

          <!-- Right -->
          <div class="col-12 col-md-4">
            <div class="d-flex flex-column flex-sm-row gap-2 justify-content-md-end">

              <app-button
                label="Edit Project"
                class="btn btn-sm btn-outline-dark w-100 w-sm-auto action-button"
                (click)="onClickEdit($event)">
              </app-button>

              <app-button
                label="Delete Project"
                class="btn btn-sm btn-outline-danger w-100 w-sm-auto action-button"
                (click)="onDeleteProject(project)">
              </app-button>

            </div>
          </div>

        </div>
      </app-card>
    </div>
  </div>


  <!-- Stats -->
  <div class="row mb-4">
    
    <div class="col-12 col-sm-6 col-md-4 mb-3">
      <app-card bgCardColor="info" textColor="white" title="Total tasks">
        <div class="text-center">
          <h3 class="fw-semibold">{{ project.totalTasks || 0 }}</h3>
        </div>
      </app-card>
    </div>

    <div class="col-12 col-sm-6 col-md-4 mb-3">
      <app-card bgCardColor="success" textColor="white" title="Completed">
        <div class="text-center">
          <h3 class="fw-semibold">{{ project.completedTasks || 0 }}</h3>
        </div>
      </app-card>
    </div>

    <div class="col-12 col-sm-6 col-md-4 mb-3">
      <app-card bgCardColor="primary" textColor="white" title="Members">
        <div class="text-center">
          <h3 class="fw-semibold">{{ project.members.length }}</h3>
        </div>
      </app-card>
    </div>

  </div>


  <!-- Members -->
  <div class="row mb-4">
    <div class="col-12">
      <app-card>

        <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-2 mb-3">
          <h5 class="fw-semibold mb-0">Team Members</h5>

          <app-button
            label="Add Member"
            class="btn btn-outline-dark btn-sm"
            (click)="onAddMember()">
          </app-button>
        </div>

        <div class="row">
          <div
            class="col-12 col-sm-6 col-md-4 col-lg-3 mb-3"
            *ngFor="let member of project.members">

            <div class="member-card shadow p-4 rounded position-relative">

              <!-- Add Task Button -->
              <div class="task-button">
                <app-button
                  label="+ Add Task"
                  class="btn btn-outline-success btn-sm add-task-btn" (click)="onAddTask()">
                </app-button>
              </div>

              <!-- Avatar + Name -->
              <div class="d-flex align-items-center gap-3 mb-2">
                <div class="avatar text-center">
                  {{ member.fullname?.charAt(0) }}
                </div>

                <div>
                  <h6 class="mb-0 fw-semibold">
                    {{ member.fullname }}
                  </h6>
                </div>
              </div>

              <!-- Email -->
              <small class="text-muted">
                <strong>Email:</strong> {{ member.email }}
              </small>

            </div>

          </div>
        </div>

      </app-card>
    </div>
  </div>


  <!-- Activity -->
  <div class="row">
    <div class="col-12">
      <!-- <app-card>

        <div class="d-flex justify-content-between align-items-center mb-3">
          <h5 class="fw-semibold mb-0">Recent Activity</h5>
        </div>

        <app-activity-list
          [projectId]="project._id">
        </app-activity-list>

      </app-card> -->
    </div>
  </div>

</div>


<app-modal [isOpen]="isModalOpen" (closemodal)="closemodal()">
  <app-form-input label="Task Title" controlName="taskTitle" type="text"></app-form-input>
  <app-textarea label="Description" controlName="description" type="text"></app-textarea>
  <app-form-input label="Due Date" controlName="dueDate" type="date-time"></app-form-input>
  <app-multi-select label="Priority"></app-multi-select>
</app-modal>
