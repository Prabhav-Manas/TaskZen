<app-card>
  <div class="card-body bg-white text-dark border shadow-sm  border-1"
       [ngClass]="{
         'border-success': project.status === 'active',
         'border-secondary': project.status === 'completed'
       }">

    <!-- Title -->
    <h5 class="fw-semibold mb-1 text-truncate">
      {{ project.name }}
    </h5>

    <!-- Description -->
    <p class="small text-muted mb-3 description">
      {{ project.description || 'No description available' }}
    </p>

    <!-- Status + Members -->
    <div class="d-flex justify-content-between align-items-center mb-3">

      <!-- Status Badge with Dot -->
      <div class="d-flex align-items-center gap-2">
        <span class="status-dot"
              [ngClass]="{
                'bg-success': project.status === 'active',
                'bg-secondary': project.status === 'completed'
              }"></span>

        <span class="small text-capitalize text-muted">
          {{ project.status }}
        </span>
      </div>

      <!-- Members -->
      <span class="small text-muted">
        👥 {{ project.members.length || 0 }}
      </span>
    </div>

    <!-- Action -->
    <div class="d-flex justify-content-end align-items-center gap-2">
      <!-- <i class="fa fa-pencil-square-o" aria-hidden="true" style="font-size: 40px; color:#000"></i> -->
      <app-button class="btn btn-outline-dark btn-sm" label="View Project" [routerLink]="['/projects', project._id]"></app-button>
    </div>

  </div>
</app-card>
