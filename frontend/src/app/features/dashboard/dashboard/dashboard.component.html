<div class="container-fluid">
    <app-header></app-header>
    <!-- Dashboard Welcome Section -->
    <div class="mb-4 bgColor text-dark p-4">
        <h2 class="">Welcome, {{user.fullname}}</h2>

        <h3 class="text-muted">Your Active Projects</h3>
    </div>

    <!-- Project Cards -->
    <div class="row g-4">
        <div class="col-md-4" *ngFor="let project of projects.slice(0, 2)" (click)="onViewProject(project)" style="cursor: pointer;">
            <app-project-card color="primary" [project]="project"></app-project-card>
        </div>

        <div class="col-md-4">
            <app-create-project-card label="Create new project" (open)="openCreateModal()"></app-create-project-card>
        </div>
    </div>

    <!-- Recent Activities -->
    <div class="mt-5">
        <app-activity-list></app-activity-list>
    </div>
</div>
