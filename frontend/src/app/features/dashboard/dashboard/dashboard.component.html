<div class="container-fluid">
    <app-header></app-header>
    <!-- Dashboard Welcome Section -->
    <div class="mb-4 bgColor text-dark p-4">
        <h2 class="">Welcome, {{user.fullname}}</h2>

        <h3 class="text-muted">Your Active Projects</h3>
    </div>

    <!-- Project Cards -->
    <div class="row g-4">
        <div class="col-md-4" *ngFor="let project of projects" [routerLink]="['/projects', project._id]" style="cursor: pointer;">
            <app-project-card color="primary" [project]="project" (editClick)="onEditClick($event)"></app-project-card>
        </div>

        <div class="col-md-4">
            <app-create-project-card label="Create new project" (open)="openCreateModal()"></app-create-project-card>
        </div>
    </div>

    <!-- Recent Activities -->
    <div class="mt-5">
        <app-activity-list></app-activity-list>
    </div>
</div>

<!-- Modal -->
<app-modal [isOpen]="isOpen" [title]="selectedProject? 'Edit Project' : 'Create Project'" (closemodal)="onCancel()">
    <form [formGroup]="createProjectForm" (ngSubmit)="onSubmit()">
        <!-- Project Name -->
        <app-form-input label="Project Name" controlName="name" [form]="createProjectForm"></app-form-input>
        
        <!-- Members -->
        <app-multi-select label="Members" controlName="members" [options]="usersList"  [form]="createProjectForm"></app-multi-select>

        <!-- Description -->
         <app-textarea label="Description" placeholder="Description" [form]="createProjectForm" controlName="description"></app-textarea>

        <!-- Actions -->
         <div class="d-flex justify-content-end mt-1 gap-2">
             <app-button type="button" color="secondary" label="Cancel" (click)="onCancel()"></app-button>
             <app-button type="submit" color="primary" [label]="selectedProject ? 'Save' : 'Create'"></app-button>
        </div>
    </form>
</app-modal>
