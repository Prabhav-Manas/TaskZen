<div class="container-fluid vh-100">
    <div class="row h-100 g-0">
        <!-- Auth-Form-Hero-Image -->
        <div class="col-12 col-md-6 p-0 order-1 order-md-1 imgBgColor d-none d-md-flex align-items-center justify-content-center">
            <img src="../../../../assets/auth-login-img2.png" alt="auth-hero-image" class="img-fluid auth-image w-100">
        </div>

        <div class="col-12 col-md-6 d-flex justify-content-center align-items-center order-2 order-md-2 bgColor">
            <form [formGroup]="otpForm" (ngSubmit)="onSubmit()">
                <div class="text-center mb-4">
                    <div class="mb-4">
                        <h2 class="text-center"><strong>Task<span class="text-primary" style="font-family:fantasy">Z</span>en</strong></h2>
                        <p class="text-center"><span class="text-primary">~</span> Plan | Trace | Achieve <span class="text-primary">~</span></p>
                    </div>
                </div>

                <h4 class="text-primary">Verify OTP</h4>
                <p class="text-secondary small mb-4">
                    Enter your registered email and we’ll send you an <span class="fw-bold text-danger" style="font-family: italic;">OTP</span> to reset your password.
                </p>

                <p class="text-muted small">
                    OTP sent to <span class="text-primary">{{ maskedEmail }}</span>
                </p>

                <!-- OTP Inputs -->
                <div class="d-flex justify-content-center gap-2 mb-3" (paste)="onPaste($event)">
                    <input *ngFor="let _ of otpArray;let i = index" type="text" 
                    maxlength="1" 
                    class="form-control text-center otp-input" 
                    [value]="otpValue[i] || ''" 
                    (input)="onInput($event, i)" 
                    (keydown)="onKeyDown($event, i)"
                    (focus)="onFocus(i, $event)" />
                </div>

                <div class="d-flex justify-content-end mt-1">
                    <app-button type="submit" color="primary" label="Verify OTP"></app-button>
                </div>
            </form>
        </div>
    </div>
</div>
