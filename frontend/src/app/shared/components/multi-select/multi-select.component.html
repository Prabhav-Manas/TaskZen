<div class="mb-3 position-relative">
  <label class="form-label">{{ label }}</label>

  <!-- Input Box -->
  <div class="form-control d-flex justify-content-between align-items-center" (click)="toggleDropdown()" style="cursor: pointer;">
    <span>{{ getSelectedLabels() || 'Select members' }}</span>

    <!-- Dropdown Arrow -->
    <span [style.transform]="isOpen ? 'rotate(180deg)' : 'rotate(0deg)'" style="transition: 0.2s;">
      ▼
    </span>
  </div>

  <!-- Dropdown -->
  <div *ngIf="isOpen" class="border rounded mt-1 p-2 bg-white position-absolute w-100" style="max-height: 150px; overflow-y: auto; z-index: 1000;">
    <div *ngFor="let option of options" class="form-check">

      <input class="form-check-input" type="checkbox" [checked]="isSelected(option)" (change)="toggleSelection(option)" id="{{option._id}}"/>

      <label class="form-check-label" [for]="option._id">
        {{ option.email }}
      </label>
      
    </div>
  </div>
</div>
