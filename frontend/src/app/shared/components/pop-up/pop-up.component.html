<div *ngIf="isOpen" class="popup-backdrop">
    <div class="popup-box">
        <h5 [ngClass]="getTitleClass()">{{title}}</h5>

        <p>{{message}}</p>

        <app-button type="button" [color]="type==='success' ? 'success' : type==='danger' ? 'danger' : 'primary'" label="OK" (click)="onClosePopUp()"></app-button>
    </div>
</div>
